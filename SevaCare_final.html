<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SevaCare – Medicine Reminder System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --mint:#d4f5e9;--mint-mid:#7dd9b4;--mint-deep:#22a06b;--mint-dark:#0d6e4a;
  --teal:#0e7490;--teal-light:#cffafe;--sky:#e0f2fe;
  --card:#ffffff;--surface:#f0faf6;--border:#c9edd9;
  --text:#0d3326;--muted:#6b8f7e;--danger:#e74c3c;--warn:#f59e0b;
}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);min-height:100vh}
.serif{font-family:'DM Serif Display',serif}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 2px 12px rgba(13,110,74,0.07)}
.btn-primary{background:linear-gradient(135deg,var(--mint-deep),var(--teal));color:#fff;border:none;border-radius:10px;padding:10px 22px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;font-size:14px;display:inline-flex;align-items:center;justify-content:center}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(34,160,107,0.35)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--mint-deep);border:2px solid var(--mint-deep);border-radius:10px;padding:9px 20px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;font-size:14px}
.btn-outline:hover{background:var(--mint);transform:translateY(-1px)}
.btn-danger{background:#fee2e2;color:var(--danger);border:none;border-radius:8px;padding:7px 14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .2s}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-edit{background:#e0f2fe;color:var(--teal);border:none;border-radius:8px;padding:7px 14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .2s}
.btn-edit:hover{background:var(--teal);color:#fff}
.input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:#fff;transition:border .2s;outline:none}
.input:focus{border-color:var(--mint-deep);box-shadow:0 0 0 3px rgba(34,160,107,0.12)}
.label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block}
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{padding:14px 20px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.15);animation:slideIn .3s ease;min-width:260px}
.toast-success{background:var(--mint-deep);color:#fff}
.toast-error{background:var(--danger);color:#fff}
.toast-info{background:var(--teal);color:#fff}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:600}
.pill-daily{background:#dcfce7;color:#15803d}
.pill-weekly{background:#fef9c3;color:#a16207}
.pill-twice_daily{background:#ede9fe;color:#7c3aed}
.pill-as_needed{background:#f1f5f9;color:#475569}
.pill-morning{background:#dbeafe;color:#1d4ed8}
.pill-afternoon{background:#fef3c7;color:#b45309}
.pill-evening{background:#ede9fe;color:#7c3aed}
.pill-night{background:#fce7f3;color:#9d174d}
.nav-item{padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:500;font-size:14px;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:10px;position:relative}
.nav-item:hover,.nav-item.active{background:var(--mint);color:var(--mint-dark)}
.badge{background:var(--mint-deep);color:#fff;border-radius:100px;font-size:11px;font-weight:700;padding:1px 7px;min-width:20px;text-align:center;line-height:1.6}
.skeleton{background:linear-gradient(90deg,#e8f5ef 25%,#d4ead9 50%,#e8f5ef 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:popIn .2s ease}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.stat-card{border-radius:16px;padding:20px;color:#fff;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.1)}
.timeline-line{width:2px;flex:1;background:#e5e7eb;min-height:32px;margin:2px 0}
.notif-card{background:#fff;border-radius:12px;padding:14px 16px;border-left:4px solid var(--mint-deep);box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .2s;cursor:pointer}
.notif-card:hover{transform:translateX(2px)}
.notif-card.unread{border-left-color:var(--warn)}
.ai-tip{background:linear-gradient(135deg,#f0fdf4,#ecfeff);border:1px solid #bbf7d0;border-radius:12px;padding:14px 16px;font-size:14px;line-height:1.65;margin-bottom:10px}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--mint-deep);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
.progress-bar{height:6px;background:#e5e7eb;border-radius:100px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--mint-deep),var(--teal));transition:width .6s ease}
.avatar{border-radius:50%;background:linear-gradient(135deg,#22a06b,#0e7490);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:'DM Serif Display',serif;flex-shrink:0}
/* Chat styles */
.chat-bubble-user{background:linear-gradient(135deg,#22a06b,#0e7490);color:#fff;border-radius:18px 18px 4px 18px;padding:11px 16px;font-size:14px;line-height:1.55;max-width:75%;align-self:flex-end;word-break:break-word}
.chat-bubble-ai{background:#fff;border:1px solid var(--border);color:var(--text);border-radius:18px 18px 18px 4px;padding:11px 16px;font-size:14px;line-height:1.55;max-width:80%;align-self:flex-start;word-break:break-word;box-shadow:0 2px 8px rgba(13,110,74,.07)}
.chat-container{display:flex;flex-direction:column;gap:14px;overflow-y:auto;padding:16px;background:#f8fffe;border-radius:14px;border:1px solid var(--border)}
.typing-dot{width:8px;height:8px;border-radius:50%;background:#22a06b;animation:typingPulse 1.4s infinite ease-in-out}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingPulse{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}
/* Insurance card */
.ins-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;transition:all .2s;cursor:default}
.ins-card:hover{box-shadow:0 6px 24px rgba(13,110,74,.12);transform:translateY(-2px)}
/* Alarm badge */
.alarm-on{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:600}
.alarm-off{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:600}
/* Alarm popup */
.alarm-popup{position:fixed;top:80px;right:20px;z-index:9998;background:#fff;border:2px solid #22a06b;border-radius:16px;padding:18px 22px;box-shadow:0 16px 48px rgba(34,160,107,.25);animation:alarmSlide .4s ease;min-width:300px;max-width:360px}
@keyframes alarmSlide{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
 
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
 
/* ─── DB helpers ─── */
const DB={
  get:k=>{try{return JSON.parse(localStorage.getItem('sc_'+k))||null}catch{return null}},
  set:(k,v)=>localStorage.setItem('sc_'+k,JSON.stringify(v)),
  del:k=>localStorage.removeItem('sc_'+k)
};
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const hashPw=async p=>{let h=0;for(const c of p){h=((h<<5)-h)+c.charCodeAt(0);h|=0;}return Math.abs(h).toString(36)+p.length.toString(16)};
const mkToken=u=>btoa(JSON.stringify({id:u.id,email:u.email,exp:Date.now()+86400000}));
const chkToken=t=>{try{const p=JSON.parse(atob(t));return p.exp>Date.now()?p:null}catch{return null}};
const now24=()=>{const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`};
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtTime=t=>{if(!t)return'';const[h,m]=t.split(':').map(Number);const ap=h>=12?'PM':'AM';return`${h%12||12}:${String(m).padStart(2,'0')} ${ap}`};
const timeSlot=t=>{if(!t)return'morning';const[h]=t.split(':').map(Number);if(h<12)return'morning';if(h<17)return'afternoon';if(h<20)return'evening';return'night'};
const greet=()=>{const h=new Date().getHours();if(h<12)return'Good morning';if(h<17)return'Good afternoon';return'Good evening'};
 
/* ─── Auth service ─── */
const AuthSvc={
  signup:async(name,email,pass)=>{
    const users=DB.get('users')||[];
    if(users.find(u=>u.email===email))return{ok:false,msg:'Email already registered'};
    const ph=await hashPw(pass);
    const u={id:uid(),name,email,ph,createdAt:new Date().toISOString()};
    users.push(u);DB.set('users',users);
    DB.set('token',mkToken(u));DB.set('me',u);
    return{ok:true,user:u};
  },
  login:async(email,pass)=>{
    const users=DB.get('users')||[];
    const u=users.find(x=>x.email===email);
    if(!u)return{ok:false,msg:'No account found with that email'};
    const ph=await hashPw(pass);
    if(ph!==u.ph)return{ok:false,msg:'Incorrect password'};
    DB.set('token',mkToken(u));DB.set('me',u);
    return{ok:true,user:u};
  },
  logout:()=>{DB.del('token');DB.del('me')},
  current:()=>{const t=DB.get('token');if(!t)return null;if(!chkToken(t))return null;return DB.get('me')}
};
 
/* ─── Medicine service ─── */
const MedSvc={
  all:uid=>(DB.get(`meds_${uid}`)||[]),
  save:(uid,med)=>{
    const list=MedSvc.all(uid);
    if(med.id){const i=list.findIndex(m=>m.id===med.id);if(i>=0)list[i]={...list[i],...med,updatedAt:new Date().toISOString()};}
    else list.push({...med,id:uid+'-m'+Date.now(),createdAt:new Date().toISOString(),takenDates:[]});
    DB.set(`meds_${uid}`,list);return list;
  },
  del:(uid,id)=>{const list=MedSvc.all(uid).filter(m=>m.id!==id);DB.set(`meds_${uid}`,list);return list;},
  markTaken:(uid,id)=>{
    const list=MedSvc.all(uid);
    const m=list.find(x=>x.id===id);
    if(m&&!m.takenDates)m.takenDates=[];
    if(m&&!m.takenDates.includes(todayStr()))m.takenDates.push(todayStr());
    DB.set(`meds_${uid}`,list);return list;
  }
};
 
/* ─── Notification service ─── */
const NotifSvc={
  all:uid=>(DB.get(`notifs_${uid}`)||[]),
  add:(uid,msg,type='info')=>{
    const n={id:uid+'-n'+Date.now(),msg,type,read:false,ts:new Date().toISOString()};
    const list=[n,...(DB.get(`notifs_${uid}`)||[])].slice(0,40);
    DB.set(`notifs_${uid}`,list);return list;
  },
  markRead:(uid,id)=>{const l=NotifSvc.all(uid).map(n=>n.id===id?{...n,read:true}:n);DB.set(`notifs_${uid}`,l);return l;},
  markAllRead:uid=>{const l=NotifSvc.all(uid).map(n=>({...n,read:true}));DB.set(`notifs_${uid}`,l);return l;}
};
 
/* ─── Alarm service ─── */
const AlarmSvc={
  getSettings:()=>DB.get('alarm_settings')||{enabled:true},
  saveSettings:(s)=>DB.set('alarm_settings',s),
  getTimers:()=>{try{return JSON.parse(localStorage.getItem('sc_alarm_timers'))||[]}catch{return[]}},
  saveTimers:(t)=>localStorage.setItem('sc_alarm_timers',JSON.stringify(t))
};

/* ─── AI Chat service ─── */
const ChatSvc={
  all:uid=>(DB.get(`chat_${uid}`)||[]),
  save:(uid,msgs)=>DB.set(`chat_${uid}`,msgs.slice(-60))
};

async function askAI(userMsg, userContext){
  const{userName,medicines,symptoms}=userContext;
  const medList=medicines&&medicines.length>0
    ?medicines.map(m=>`${m.name} (${m.dosage}, ${m.frequency}, taken at ${m.time})`).join('; ')
    :'No medicines listed';
  const systemContent=`You are a professional healthcare assistant for SevaCare, a medicine reminder app.
Patient name: ${userName||'User'}.
Current medicines: ${medList}.
${symptoms?`Reported symptoms: ${symptoms}.`:''}
Your role: Provide safe, general medical advice, wellness tips, medicine interaction caution, diet/lifestyle suggestions.
ALWAYS end every response with: "⚠️ Disclaimer: This is general health information only. Please consult a qualified doctor for medical diagnosis and treatment."
Keep responses concise, warm, and practical. Use simple language. Use bullet points for lists.`;

  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1000,
        system:systemContent,
        messages:[{role:'user',content:userMsg}]
      })
    });
    const data=await response.json();
    if(!response.ok){
      const errDetail=data.error?.message||`API error ${response.status}`;
      console.error('Chatbot API error:',errDetail);
      return `⚠️ AI service error: ${errDetail}\n\n⚠️ Disclaimer: This is general health information only. Please consult a qualified doctor for medical diagnosis and treatment.`;
    }
    return data.content?.[0]?.text||'Sorry, I could not process your request. Please try again.';
  }catch(err){
    console.error('Chatbot Error:',err);
    return '⚠️ Unable to reach the AI service. Please check your internet connection and try again.\n\n⚠️ Disclaimer: This is general health information only. Please consult a qualified doctor for medical diagnosis and treatment.';
  }
}

  {id:'rashtriya',name:'Rashtriya Swasthya Bima Yojana (RSBY)',icon:'💳',eligibility:'BPL families, unorganised sector workers',benefits:'₹30,000/year hospitalization cover, cashless treatment at empanelled hospitals',state:'All India',category:'BPL',applyLink:'https://rsby.gov.in',color:'#fff7ed',border:'#fed7aa'},

/* ─── Toast hook ─── */
function useToast(){
  const[toasts,setToasts]=useState([]);
  const show=useCallback((msg,type='success')=>{
    const id=uid();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3600);
  },[]);
  return{toasts,show};
}
function Toast({toasts}){
  return <div className="toast-wrap">{toasts.map(t=><div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>)}</div>;
}
 
/* ─── Field component ─── */
const Field=({label,children})=><div style={{marginBottom:14}}><label className="label">{label}</label>{children}</div>;
 
/* ═══════════════════════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════════════════════ */
function AuthScreen({onAuth,showToast}){
  const[mode,setMode]=useState('login');
  const[f,setF]=useState({name:'',email:'',pass:''});
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const upd=k=>e=>setF(p=>({...p,[k]:e.target.value}));
 
  const validate=()=>{
    if(mode==='signup'&&f.name.trim().length<2)return'Name needs at least 2 characters';
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email))return'Enter a valid email address';
    if(f.pass.length<6)return'Password must be at least 6 characters';
    return'';
  };
 
  const submit=async e=>{
    e.preventDefault();setErr('');
    const v=validate();if(v){setErr(v);return;}
    setBusy(true);
    try{
      const r=mode==='signup'?await AuthSvc.signup(f.name,f.email,f.pass):await AuthSvc.login(f.email,f.pass);
      if(!r.ok)setErr(r.msg);
      else{showToast(`Welcome${mode==='signup'?' to SevaCare':' back'}, ${r.user.name}! 🎉`);onAuth(r.user);}
    }finally{setBusy(false);}
  };
 
  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#d4f5e9 0%,#cffafe 60%,#e0f2fe 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{width:'100%',maxWidth:440}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{width:68,height:68,borderRadius:20,background:'linear-gradient(135deg,#22a06b,#0e7490)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:30,boxShadow:'0 10px 30px rgba(34,160,107,.3)'}}>🏥</div>
          <h1 className="serif" style={{fontSize:34,color:'#0d3326',letterSpacing:'.5px'}}>SevaCare</h1>
          <p style={{color:'#6b8f7e',fontSize:14,marginTop:6}}>Your personal medicine reminder &amp; health companion</p>
        </div>
 
        <div className="card" style={{padding:32}}>
          <div style={{display:'flex',marginBottom:24,background:'#f0faf6',borderRadius:10,padding:4}}>
            {['login','signup'].map(m=>(
              <button key={m} onClick={()=>{setMode(m);setErr('');setF({name:'',email:'',pass:''});}}
                style={{flex:1,padding:'9px',border:'none',borderRadius:8,fontFamily:'DM Sans,sans-serif',fontWeight:600,fontSize:14,cursor:'pointer',transition:'all .2s',background:mode===m?'#fff':'transparent',color:mode===m?'#0d6e4a':'#6b8f7e',boxShadow:mode===m?'0 2px 8px rgba(0,0,0,.08)':'none'}}>
                {m==='login'?'Sign In':'Create Account'}
              </button>
            ))}
          </div>
 
          <form onSubmit={submit}>
            {mode==='signup'&&<Field label="Full Name"><input className="input" placeholder="Your full name" value={f.name} onChange={upd('name')}/></Field>}
            <Field label="Email Address"><input className="input" type="email" placeholder="you@example.com" value={f.email} onChange={upd('email')}/></Field>
            <Field label="Password"><input className="input" type="password" placeholder="At least 6 characters" value={f.pass} onChange={upd('pass')}/></Field>
            {err&&<div style={{background:'#fee2e2',color:'#b91c1c',borderRadius:8,padding:'10px 14px',fontSize:13,marginBottom:16,fontWeight:500}}>{err}</div>}
            <button className="btn-primary" type="submit" style={{width:'100%',padding:13,fontSize:15,marginTop:4}} disabled={busy}>
              {busy?'Please wait…':(mode==='login'?'Sign In →':'Create My Account →')}
            </button>
          </form>
 
          <p style={{textAlign:'center',marginTop:18,fontSize:13,color:'#6b8f7e'}}>
            {mode==='login'?'New to SevaCare? ':'Have an account? '}
            <span onClick={()=>{setMode(mode==='login'?'signup':'login');setErr('');}} style={{color:'#22a06b',fontWeight:600,cursor:'pointer',textDecoration:'underline'}}>
              {mode==='login'?'Sign Up':'Sign In'}
            </span>
          </p>
        </div>
        <p style={{textAlign:'center',color:'#9db8ac',fontSize:12,marginTop:16}}>🔒 All data is encrypted and stored locally on your device</p>
      </div>
    </div>
  );
}
 
/* ═══════════════════════════════════════════════════════
   MEDICINE MODAL (Add / Edit)
═══════════════════════════════════════════════════════ */
function MedModal({med,onSave,onClose}){
  const init={name:'',dosage:'',time:'08:00',frequency:'daily',notes:''};
  const[f,setF]=useState(med?{name:med.name,dosage:med.dosage,time:med.time,frequency:med.frequency,notes:med.notes||''}:init);
  const[err,setErr]=useState('');
  const upd=k=>e=>setF(p=>({...p,[k]:e.target.value}));
 
  const validate=()=>{
    if(!f.name.trim())return'Medicine name is required';
    if(!f.dosage.trim())return'Dosage is required';
    if(!f.time)return'Please select a time';
    return'';
  };
 
  const save=e=>{
    e.preventDefault();
    const v=validate();if(v){setErr(v);return;}
    onSave({...f,...(med?{id:med.id}:{})});
  };
 
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
          <h2 className="serif" style={{fontSize:22,color:'#0d3326'}}>{med?'✏️ Edit Medicine':'💊 Add New Medicine'}</h2>
          <button onClick={onClose} style={{background:'#f5f5f5',border:'none',width:32,height:32,borderRadius:8,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>
        <form onSubmit={save}>
          <Field label="Medicine Name *"><input className="input" placeholder="e.g. Metformin 500mg" value={f.name} onChange={upd('name')}/></Field>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <Field label="Dosage *"><input className="input" placeholder="e.g. 1 tablet" value={f.dosage} onChange={upd('dosage')}/></Field>
            <Field label="Time *"><input className="input" type="time" value={f.time} onChange={upd('time')}/></Field>
          </div>
          <Field label="Frequency">
            <select className="input" value={f.frequency} onChange={upd('frequency')}>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="twice_daily">Twice Daily</option>
              <option value="as_needed">As Needed</option>
            </select>
          </Field>
          <Field label="Notes (Optional)"><input className="input" placeholder="e.g. Take after meals" value={f.notes} onChange={upd('notes')}/></Field>
          {err&&<div style={{background:'#fee2e2',color:'#b91c1c',borderRadius:8,padding:'10px 14px',fontSize:13,marginBottom:16}}>{err}</div>}
          <div style={{display:'flex',gap:10,marginTop:8}}>
            <button type="button" className="btn-outline" style={{flex:1}} onClick={onClose}>Cancel</button>
            <button type="submit" className="btn-primary" style={{flex:1}}>{med?'Update Medicine':'Add Medicine'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}
 
/* ═══════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════ */
function Dashboard({user,meds,onMarkTaken,showToast}){
  const today=todayStr(),cur=now24();
  const taken=meds.filter(m=>m.takenDates?.includes(today));
  const upcoming=meds.filter(m=>m.time>=cur&&!m.takenDates?.includes(today)).sort((a,b)=>a.time.localeCompare(b.time));
  const overdue=meds.filter(m=>m.time<cur&&!m.takenDates?.includes(today));
  const pct=meds.length?Math.round((taken.length/meds.length)*100):0;
 
  const stats=[
    {icon:'💊',label:'Total Medicines',val:meds.length,bg:'linear-gradient(135deg,#22a06b,#0e7490)'},
    {icon:'✅',label:'Taken Today',val:taken.length,bg:'linear-gradient(135deg,#0e7490,#0369a1)'},
    {icon:'⏰',label:'Upcoming',val:upcoming.length,bg:'linear-gradient(135deg,#d97706,#b45309)'},
    {icon:'⚠️',label:'Overdue',val:overdue.length,bg:'linear-gradient(135deg,#dc2626,#b91c1c)'},
  ];
 
  return(
    <div>
      <div style={{marginBottom:28}}>
        <h1 className="serif" style={{fontSize:28,color:'#0d3326'}}>{greet()}, {user.name.split(' ')[0]}! 👋</h1>
        <p style={{color:'#6b8f7e',marginTop:4,fontSize:14}}>Here's your medicine schedule for today, {new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</p>
      </div>
 
      {/* Stats row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}}>
        {stats.map(s=>(
          <div key={s.label} className="stat-card" style={{background:s.bg}}>
            <div style={{fontSize:26,marginBottom:8}}>{s.icon}</div>
            <div style={{fontSize:30,fontWeight:700,lineHeight:1}}>{s.val}</div>
            <div style={{fontSize:12,opacity:.9,marginTop:4}}>{s.label}</div>
          </div>
        ))}
      </div>
 
      {/* Adherence */}
      <div className="card" style={{padding:22,marginBottom:18}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <span style={{fontWeight:600,fontSize:15}}>Today's Adherence</span>
          <span style={{fontWeight:700,color:'#22a06b',fontSize:20}}>{pct}%</span>
        </div>
        <div className="progress-bar"><div className="progress-fill" style={{width:pct+'%'}}></div></div>
        <p style={{fontSize:12,color:'#6b8f7e',marginTop:8}}>{taken.length} of {meds.length} medicines taken</p>
      </div>
 
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
        {/* Upcoming */}
        <div className="card" style={{padding:22}}>
          <h3 style={{fontWeight:600,fontSize:15,marginBottom:14}}>⏰ Upcoming</h3>
          {upcoming.length===0
            ?<EmptyState icon="🎉" msg="All done for now!" sub="No upcoming doses"/>
            :upcoming.slice(0,4).map(m=>(
              <div key={m.id} style={{display:'flex',gap:10,alignItems:'center',padding:'9px 0',borderBottom:'1px solid #f5f5f5'}}>
                <div style={{fontSize:22}}>💊</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{m.name}</div>
                  <div style={{fontSize:12,color:'#6b8f7e'}}>{m.dosage} · {fmtTime(m.time)}</div>
                </div>
                <button className="btn-primary" style={{padding:'5px 11px',fontSize:12}} onClick={()=>{onMarkTaken(m.id);showToast(`✅ ${m.name} marked as taken`);}}>Take</button>
              </div>
            ))
          }
        </div>
 
        {/* Overdue */}
        <div className="card" style={{padding:22}}>
          <h3 style={{fontWeight:600,fontSize:15,marginBottom:14}}>⚠️ Overdue</h3>
          {overdue.length===0
            ?<EmptyState icon="✨" msg="No overdue medicines!" sub="Great job keeping up"/>
            :overdue.slice(0,4).map(m=>(
              <div key={m.id} style={{display:'flex',gap:10,alignItems:'center',padding:'9px',background:'#fff7f7',borderRadius:8,marginBottom:6}}>
                <div style={{fontSize:20}}>⚠️</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:'#b91c1c'}}>{m.name}</div>
                  <div style={{fontSize:12,color:'#6b8f7e'}}>Due at {fmtTime(m.time)}</div>
                </div>
                <button className="btn-primary" style={{padding:'5px 11px',fontSize:12}} onClick={()=>{onMarkTaken(m.id);showToast(`✅ ${m.name} taken`);}}>Done</button>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}
 
function EmptyState({icon,msg,sub}){
  return(
    <div style={{textAlign:'center',padding:'20px 0',color:'#6b8f7e'}}>
      <div style={{fontSize:30,marginBottom:6}}>{icon}</div>
      <div style={{fontWeight:600,fontSize:14,color:'#0d3326'}}>{msg}</div>
      {sub&&<div style={{fontSize:12,marginTop:3}}>{sub}</div>}
    </div>
  );
}
 
/* ═══════════════════════════════════════════════════════
   MEDICINES PAGE
═══════════════════════════════════════════════════════ */
function Medicines({user,meds,onSave,onDelete,onMarkTaken,showToast}){
  const[modal,setModal]=useState(null);
  const[search,setSearch]=useState('');
  const[filter,setFilter]=useState('all');
  const[delConfirm,setDelConfirm]=useState(null);
  const today=todayStr();
 
  const shown=meds.filter(m=>{
    const q=search.toLowerCase();
    const ok=m.name.toLowerCase().includes(q)||m.dosage.toLowerCase().includes(q)||m.notes?.toLowerCase().includes(q);
    const fOk=filter==='all'||m.frequency===filter||timeSlot(m.time)===filter;
    return ok&&fOk;
  });
 
  const doSave=form=>{
    onSave(form);setModal(null);
    showToast(form.id?'Medicine updated ✏️':'Medicine added 💊');
  };
  const doDel=id=>{
    const m=meds.find(x=>x.id===id);
    onDelete(id);setDelConfirm(null);
    showToast(`${m?.name||'Medicine'} removed`,'info');
  };
 
  const freqLabels={daily:'Daily',weekly:'Weekly',twice_daily:'Twice Daily',as_needed:'As Needed'};
 
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22,flexWrap:'wrap',gap:12}}>
        <div>
          <h1 className="serif" style={{fontSize:26,color:'#0d3326'}}>My Medicines</h1>
          <p style={{color:'#6b8f7e',fontSize:14,marginTop:2}}>{meds.length} medicine{meds.length!==1?'s':''} in your schedule</p>
        </div>
        <button className="btn-primary" onClick={()=>setModal('add')}>+ Add Medicine</button>
      </div>
 
      <div style={{display:'flex',gap:10,marginBottom:18,flexWrap:'wrap'}}>
        <input className="input" style={{flex:1,minWidth:200}} placeholder="🔍 Search medicines…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="input" style={{width:'auto'}} value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="all">All Medicines</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="twice_daily">Twice Daily</option>
          <option value="morning">Morning</option>
          <option value="afternoon">Afternoon</option>
          <option value="evening">Evening</option>
          <option value="night">Night</option>
        </select>
      </div>
 
      {shown.length===0
        ?<div className="card" style={{padding:48,textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:12}}>💊</div>
          <h3 style={{fontWeight:600,marginBottom:6}}>{search?'No results found':'No medicines yet'}</h3>
          <p style={{color:'#6b8f7e',fontSize:14,marginBottom:20}}>{search?'Try a different search':'Add your first medicine to get started'}</p>
          {!search&&<button className="btn-primary" onClick={()=>setModal('add')}>+ Add First Medicine</button>}
        </div>
        :<div style={{display:'flex',flexDirection:'column',gap:12}}>
          {shown.map(m=>{
            const tk=m.takenDates?.includes(today);
            return(
              <div key={m.id} className="card" style={{padding:18,display:'flex',alignItems:'center',gap:14}}>
                <div style={{width:50,height:50,borderRadius:14,background:tk?'#dcfce7':'linear-gradient(135deg,#d4f5e9,#cffafe)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>
                  {tk?'✅':'💊'}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:4}}>
                    <span style={{fontWeight:700,fontSize:14}}>{m.name}</span>
                    <span className={`pill pill-${m.frequency}`}>{freqLabels[m.frequency]||m.frequency}</span>
                    <span className={`pill pill-${timeSlot(m.time)}`}>{timeSlot(m.time)}</span>
                    {tk&&<span className="pill" style={{background:'#dcfce7',color:'#15803d'}}>✓ Taken today</span>}
                  </div>
                  <div style={{fontSize:12,color:'#6b8f7e',display:'flex',gap:14,flexWrap:'wrap'}}>
                    <span>💉 {m.dosage}</span>
                    <span>⏰ {fmtTime(m.time)}</span>
                    {m.notes&&<span>📝 {m.notes}</span>}
                  </div>
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  {!tk&&<button className="btn-primary" style={{padding:'6px 12px',fontSize:12}} onClick={()=>{onMarkTaken(m.id);showToast(`✅ ${m.name} taken`);}}>Take</button>}
                  <button className="btn-edit" onClick={()=>setModal(m)}>Edit</button>
                  <button className="btn-danger" onClick={()=>setDelConfirm(m.id)}>Delete</button>
                </div>
              </div>
            );
          })}
        </div>
      }
 
      {modal&&<MedModal med={modal==='add'?null:modal} onSave={doSave} onClose={()=>setModal(null)}/>}
 
      {delConfirm&&(
        <div className="modal-overlay" onClick={()=>setDelConfirm(null)}>
          <div className="modal" style={{maxWidth:360,textAlign:'center'}}>
            <div style={{fontSize:52,marginBottom:14}}>🗑️</div>
            <h3 style={{fontWeight:700,fontSize:20,marginBottom:8}}>Remove this medicine?</h3>
            <p style={{color:'#6b8f7e',fontSize:14,marginBottom:24}}>This action cannot be undone.</p>
            <div style={{display:'flex',gap:10}}>
              <button className="btn-outline" style={{flex:1}} onClick={()=>setDelConfirm(null)}>Cancel</button>
              <button className="btn-danger" style={{flex:1,padding:'11px',fontSize:14}} onClick={()=>doDel(delConfirm)}>Yes, Remove</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
 
/* ═══════════════════════════════════════════════════════
   SCHEDULE PAGE
═══════════════════════════════════════════════════════ */
function Schedule({meds,onMarkTaken,showToast}){
  const today=todayStr(),cur=now24();
  const sorted=[...meds].sort((a,b)=>a.time.localeCompare(b.time));
  const hours=['06','08','10','12','14','16','18','20','22'];
 
  const slotMeds=h=>sorted.filter(m=>{const[mh]=m.time.split(':');return parseInt(mh)>=parseInt(h)&&parseInt(mh)<parseInt(h)+2;});
 
  return(
    <div>
      <div style={{marginBottom:24}}>
        <h1 className="serif" style={{fontSize:26,color:'#0d3326'}}>Daily Schedule</h1>
        <p style={{color:'#6b8f7e',fontSize:14,marginTop:2}}>Your medicine timeline — {new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 220px',gap:20,alignItems:'start'}}>
        <div className="card" style={{padding:24}}>
          {hours.map((h,i)=>{
            const ms=slotMeds(h);
            const timeStr=`${h}:00`;
            const past=timeStr<cur;
            return(
              <div key={h} style={{display:'flex',gap:16,marginBottom:4}}>
                <div style={{width:58,textAlign:'right',paddingTop:2,fontSize:12,fontWeight:600,color:past?'#9ca3af':'#6b8f7e',flexShrink:0}}>{fmtTime(timeStr)}</div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
                  <div style={{width:12,height:12,borderRadius:50,background:ms.length>0?'#22a06b':past?'#d1d5db':'#c9edd9',border:`3px solid ${ms.length>0?'#d4f5e9':past?'#f3f4f6':'#e5e7eb'}`,flexShrink:0}}></div>
                  {i<hours.length-1&&<div className="timeline-line"></div>}
                </div>
                <div style={{flex:1,paddingBottom:16}}>
                  {ms.length===0
                    ?<div style={{height:28,display:'flex',alignItems:'center'}}><span style={{fontSize:13,color:'#d1d5db'}}>No medicines scheduled</span></div>
                    :ms.map(m=>{
                      const tk=m.takenDates?.includes(today);
                      return(
                        <div key={m.id} style={{background:tk?'#f0fdf4':past&&!tk?'#fff7f7':'#f9fafb',border:`1px solid ${tk?'#bbf7d0':past&&!tk?'#fecaca':'#e5e7eb'}`,borderRadius:10,padding:'10px 14px',marginBottom:6,display:'flex',alignItems:'center',gap:10}}>
                          <span style={{fontSize:20}}>{tk?'✅':past&&!tk?'⚠️':'💊'}</span>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:600,fontSize:13}}>{m.name}</div>
                            <div style={{fontSize:12,color:'#6b8f7e'}}>{m.dosage}</div>
                          </div>
                          {tk
                            ?<span className="pill" style={{background:'#dcfce7',color:'#15803d'}}>Taken ✓</span>
                            :<button className="btn-primary" style={{padding:'5px 12px',fontSize:12}} onClick={()=>{onMarkTaken(m.id);showToast(`✅ ${m.name} taken`);}}>Take Now</button>
                          }
                        </div>
                      );
                    })
                  }
                </div>
              </div>
            );
          })}
        </div>
 
        <div>
          <div className="card" style={{padding:20,marginBottom:14}}>
            <h4 style={{fontWeight:600,fontSize:14,marginBottom:14}}>📊 Today's Summary</h4>
            {[
              {l:'Total',v:meds.length,i:'💊'},
              {l:'Taken',v:meds.filter(m=>m.takenDates?.includes(today)).length,i:'✅'},
              {l:'Pending',v:meds.filter(m=>!m.takenDates?.includes(today)&&m.time>=cur).length,i:'⏳'},
              {l:'Missed',v:meds.filter(m=>!m.takenDates?.includes(today)&&m.time<cur).length,i:'⚠️'},
            ].map(s=>(
              <div key={s.l} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid #f5f5f5'}}>
                <span style={{fontSize:13,color:'#6b8f7e'}}>{s.i} {s.l}</span>
                <span style={{fontWeight:700}}>{s.v}</span>
              </div>
            ))}
          </div>
          <div className="card" style={{padding:20,background:'linear-gradient(135deg,#f0fdf4,#ecfeff)'}}>
            <div style={{fontSize:28,marginBottom:8}}>💡</div>
            <p style={{fontSize:13,color:'#0d3326',lineHeight:1.5}}>Consistent medication adherence can improve treatment outcomes by up to 50%.</p>
          </div>
        </div>
      </div>
    </div>
  );
}
 
/* ═══════════════════════════════════════════════════════
   NOTIFICATIONS PAGE
═══════════════════════════════════════════════════════ */
function Notifications({user,notifs,onMarkRead,onMarkAllRead}){
  const unread=notifs.filter(n=>!n.read).length;
  const icon={success:'✅',warning:'⚠️',info:'💊',reminder:'⏰'};
  const ago=ts=>{const d=Math.floor((Date.now()-new Date(ts))/60000);if(d<1)return'just now';if(d<60)return d+'m ago';if(d<1440)return Math.floor(d/60)+'h ago';return Math.floor(d/1440)+'d ago';};
 
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22,flexWrap:'wrap',gap:12}}>
        <div>
          <h1 className="serif" style={{fontSize:26,color:'#0d3326'}}>Notifications</h1>
          <p style={{color:'#6b8f7e',fontSize:14,marginTop:2}}>{unread} unread</p>
        </div>
        {unread>0&&<button className="btn-outline" onClick={onMarkAllRead}>Mark all read</button>}
      </div>
 
      {notifs.length===0
        ?<div className="card" style={{padding:48,textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:12}}>🔔</div>
          <h3 style={{fontWeight:600,marginBottom:6}}>No notifications yet</h3>
          <p style={{color:'#6b8f7e',fontSize:14}}>Reminders and alerts will appear here</p>
        </div>
        :<div style={{display:'flex',flexDirection:'column',gap:10}}>
          {notifs.map(n=>(
            <div key={n.id} className={`notif-card${!n.read?' unread':''}`} onClick={()=>onMarkRead(n.id)}>
              <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
                <span style={{fontSize:22,flexShrink:0}}>{icon[n.type]||'🔔'}</span>
                <div style={{flex:1}}>
                  <p style={{fontSize:14,fontWeight:n.read?400:600,lineHeight:1.45,color:'#0d3326'}}>{n.msg}</p>
                  <p style={{fontSize:12,color:'#6b8f7e',marginTop:4}}>{ago(n.ts)}</p>
                </div>
                {!n.read&&<div className="pulse-dot" style={{marginTop:4}}></div>}
              </div>
            </div>
          ))}
        </div>
      }
    </div>
  );
}
 
/* ═══════════════════════════════════════════════════════
   AI CHATBOT PAGE
═══════════════════════════════════════════════════════ */
function AIChatbot({user,meds,showToast}){
  const[msgs,setMsgs]=useState(()=>ChatSvc.all(user.id));
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(false);
  const[symptoms,setSymptoms]=useState('');
  const[showSymptoms,setShowSymptoms]=useState(false);
  const chatEndRef=useRef(null);
  const inputRef=useRef(null);

  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,loading]);

  const sendMsg=async(text)=>{
    const txt=(text||input).trim();
    if(!txt||loading)return;
    setInput('');
    const userMsg={id:uid(),role:'user',text:txt,ts:new Date().toISOString()};
    const updated=[...msgs,userMsg];
    setMsgs(updated);
    ChatSvc.save(user.id,updated);
    setLoading(true);
    try{
      const reply=await askAI(txt,{userName:user.name,medicines:meds,symptoms});
      const aiMsg={id:uid(),role:'ai',text:reply,ts:new Date().toISOString()};
      const final=[...updated,aiMsg];
      setMsgs(final);
      ChatSvc.save(user.id,final);
    }catch(e){
      const errMsg={id:uid(),role:'ai',text:'⚠️ I\'m having trouble connecting right now. Please check your internet connection and try again. For urgent medical needs, please contact a doctor directly.',ts:new Date().toISOString()};
      const final=[...updated,errMsg];
      setMsgs(final);
      ChatSvc.save(user.id,final);
      showToast('AI connection error','error');
    }
    setLoading(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  };

  const clearChat=()=>{
    setMsgs([]);ChatSvc.save(user.id,[]);
    showToast('Chat cleared','info');
  };

  const quickPrompts=[
    {t:'💊 Medicine interactions',q:'Can you check if any of my medicines might interact with each other?'},
    {t:'🥗 Diet tips',q:'What foods should I eat or avoid given my current medicines?'},
    {t:'😴 Sleep issues',q:'I\'m having trouble sleeping. What can you suggest?'},
    {t:'🏃 Exercise advice',q:'What type of exercise is safe given my current health condition?'},
    {t:'⚠️ Side effects',q:'What are common side effects I should watch out for with my medicines?'},
    {t:'💉 Dosage help',q:'I sometimes forget doses. What\'s the safest way to handle missed doses?'},
  ];

  const formatAIText=(text)=>{
    return text.split('\n').map((line,i)=>{
      if(line.startsWith('**')&&line.endsWith('**'))return<div key={i} style={{fontWeight:700,marginBottom:4}}>{line.slice(2,-2)}</div>;
      if(line.startsWith('• ')||line.startsWith('- '))return<div key={i} style={{paddingLeft:12,marginBottom:2}}>• {line.slice(2)}</div>;
      if(line.startsWith('⚠️'))return<div key={i} style={{marginTop:10,padding:'8px 10px',background:'#fefce8',borderRadius:6,fontSize:12,color:'#854d0e',lineHeight:1.5}}>{line}</div>;
      if(!line.trim())return<div key={i} style={{height:6}}></div>;
      const parts=line.split(/\*\*(.*?)\*\*/g);
      return<div key={i} style={{marginBottom:2}}>{parts.map((p,j)=>j%2===1?<strong key={j}>{p}</strong>:<span key={j}>{p}</span>)}</div>;
    });
  };

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22,flexWrap:'wrap',gap:12}}>
        <div>
          <h1 className="serif" style={{fontSize:26,color:'#0d3326'}}>AI Health Assistant 🤖</h1>
          <p style={{color:'#6b8f7e',fontSize:14,marginTop:2}}>Doctor-level general health guidance, personalised for you</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn-outline" style={{fontSize:13,padding:'8px 14px'}} onClick={()=>setShowSymptoms(p=>!p)}>
            {showSymptoms?'Hide':'Add'} Symptoms
          </button>
          {msgs.length>0&&<button className="btn-outline" style={{fontSize:13,padding:'8px 14px',color:'#dc2626',borderColor:'#dc2626'}} onClick={clearChat}>🗑️ Clear Chat</button>}
        </div>
      </div>

      {showSymptoms&&(
        <div className="card" style={{padding:16,marginBottom:16,background:'#fff7ed',border:'1px solid #fed7aa'}}>
          <label className="label" style={{marginBottom:6}}>Describe current symptoms (optional — helps AI give better advice):</label>
          <div style={{display:'flex',gap:8}}>
            <input className="input" value={symptoms} onChange={e=>setSymptoms(e.target.value)} placeholder="e.g. headache since yesterday, mild fever, fatigue…" style={{flex:1}}/>
            <button className="btn-primary" style={{padding:'8px 14px',fontSize:13}} onClick={()=>{setShowSymptoms(false);showToast('Symptoms saved for context ✓');}}>Save</button>
          </div>
          {symptoms&&<p style={{fontSize:12,color:'#92400e',marginTop:8}}>✓ AI will consider: "{symptoms}"</p>}
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 260px',gap:18,alignItems:'start'}}>
        <div>
          {/* Quick prompts */}
          {msgs.length===0&&(
            <div style={{marginBottom:14}}>
              <p style={{fontSize:13,fontWeight:600,color:'#6b8f7e',marginBottom:10}}>Quick questions to get started:</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {quickPrompts.map(q=>(
                  <button key={q.t} onClick={()=>sendMsg(q.q)}
                    style={{background:'#fff',border:'1px solid var(--border)',borderRadius:20,padding:'7px 14px',fontSize:12,fontWeight:600,color:'var(--mint-dark)',cursor:'pointer',fontFamily:'DM Sans,sans-serif',transition:'all .2s'}}
                    onMouseEnter={e=>{e.target.style.background='var(--mint)';e.target.style.borderColor='var(--mint-deep)';}}
                    onMouseLeave={e=>{e.target.style.background='#fff';e.target.style.borderColor='var(--border)';}}>
                    {q.t}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Chat area */}
          <div className="chat-container" style={{minHeight:340,maxHeight:460}}>
            {msgs.length===0&&!loading&&(
              <div style={{textAlign:'center',padding:'40px 20px',color:'#9db8ac'}}>
                <div style={{fontSize:48,marginBottom:12}}>🤖</div>
                <div style={{fontWeight:600,fontSize:15,color:'#6b8f7e'}}>Hi {user.name.split(' ')[0]}! I'm your SevaCare AI Assistant.</div>
                <div style={{fontSize:13,marginTop:6}}>Ask me anything about your health, medicines, diet, or symptoms.</div>
                {meds.length>0&&<div style={{fontSize:12,marginTop:8,color:'#22a06b'}}>I'm aware of your {meds.length} medicine{meds.length!==1?'s':''} 💊</div>}
              </div>
            )}
            {msgs.map(m=>(
              <div key={m.id} style={{display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start',gap:4}}>
                {m.role==='ai'&&(
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                    <div style={{width:24,height:24,borderRadius:50,background:'linear-gradient(135deg,#22a06b,#0e7490)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}}>🤖</div>
                    <span style={{fontSize:11,color:'#9db8ac',fontWeight:600}}>SevaCare AI</span>
                  </div>
                )}
                <div className={m.role==='user'?'chat-bubble-user':'chat-bubble-ai'}>
                  {m.role==='ai'?formatAIText(m.text):m.text}
                </div>
                <div style={{fontSize:10,color:'#b0c4b8',marginTop:1}}>{new Date(m.ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
              </div>
            ))}
            {loading&&(
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:4}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:24,height:24,borderRadius:50,background:'linear-gradient(135deg,#22a06b,#0e7490)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}}>🤖</div>
                  <span style={{fontSize:11,color:'#9db8ac',fontWeight:600}}>SevaCare AI is thinking…</span>
                </div>
                <div className="chat-bubble-ai" style={{display:'flex',gap:5,alignItems:'center',padding:'14px 18px'}}>
                  <div className="typing-dot"></div>
                  <div className="typing-dot"></div>
                  <div className="typing-dot"></div>
                </div>
              </div>
            )}
            <div ref={chatEndRef}></div>
          </div>

          {/* Input */}
          <div style={{display:'flex',gap:8,marginTop:12}}>
            <input ref={inputRef} className="input" value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}}
              placeholder="Ask me about your health, medicines, symptoms…"
              disabled={loading} style={{flex:1}}/>
            <button className="btn-primary" onClick={()=>sendMsg()} disabled={!input.trim()||loading} style={{padding:'10px 18px',fontSize:14,flexShrink:0}}>
              {loading?'…':'Send →'}
            </button>
          </div>
          <p style={{fontSize:11,color:'#9db8ac',marginTop:6,textAlign:'center'}}>Powered by Claude AI · Always consult a real doctor for medical decisions</p>
        </div>

        {/* Sidebar */}
        <div>
          <div className="card" style={{padding:18,marginBottom:14}}>
            <h4 style={{fontWeight:600,fontSize:14,marginBottom:12}}>💊 Your Medicines Context</h4>
            {meds.length===0
              ?<p style={{fontSize:13,color:'#6b8f7e'}}>No medicines added yet. Add medicines so AI can give personalised advice.</p>
              :meds.slice(0,5).map(m=>(
                <div key={m.id} style={{padding:'7px 0',borderBottom:'1px solid #f5f5f5',fontSize:12}}>
                  <div style={{fontWeight:600,color:'#0d3326'}}>{m.name}</div>
                  <div style={{color:'#6b8f7e'}}>{m.dosage} · {m.frequency}</div>
                </div>
              ))
            }
            {meds.length>5&&<p style={{fontSize:11,color:'#6b8f7e',marginTop:6}}>+{meds.length-5} more medicines</p>}
          </div>
          <div className="card" style={{padding:18,background:'linear-gradient(135deg,#f0fdf4,#ecfeff)'}}>
            <div style={{fontSize:24,marginBottom:8}}>🛡️</div>
            <h4 style={{fontWeight:600,fontSize:13,marginBottom:6}}>Safe & Private</h4>
            <p style={{fontSize:12,color:'#6b8f7e',lineHeight:1.55}}>Your chat history is stored only on your device. No data is shared with third parties.</p>
            <div style={{marginTop:10,fontSize:12,color:'#9db8ac'}}>
              Chat history: {msgs.length} message{msgs.length!==1?'s':''}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

async function getAISuggestions(topic, userContext) {
  const topicLabels = {
    general: 'General Health & Wellness',
    medication: 'Medication Management Tips',
    diet: 'Diet & Nutrition',
    lifestyle: 'Healthy Lifestyle Habits',
    sleep: 'Better Sleep Hygiene'
  };
  const topicLabel = topicLabels[topic] || topic;
  const medList = (userContext.medicines || []).length > 0
    ? (userContext.medicines || []).map(m => `${m.name} (${m.dosage}, ${m.frequency})`).join('; ')
    : 'No medicines currently listed';

  const systemPrompt = `You are a professional healthcare expert and wellness advisor for SevaCare, a medicine reminder app.
Patient name: ${userContext.userName || 'User'}.
Current medicines: ${medList}.
Your role: Provide safe, practical, personalised health and wellness suggestions tailored to the topic and the patient's medicine list. Be specific, warm, and actionable.
ALWAYS end your response with a short disclaimer line starting with "⚠️ Disclaimer:".
Format your response as exactly 5 bullet points using • as the bullet character. Each bullet should start with a relevant emoji, then a bold title in **, then a colon, then the explanation.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: `Give me 5 personalised health suggestions for the topic: "${topicLabel}".\nMy medicines: ${medList}.\nFormat: exactly 5 bullet points (•), each starting with an emoji and **Bold Title**: explanation.\nEnd with a ⚠️ Disclaimer line.` }]
      })
    });
    const data = await response.json();
    if (!response.ok) {
      const errDetail = data.error?.message || `API error ${response.status}`;
      console.error('AI Suggestions error:', errDetail);
      return `⚠️ AI service error: ${errDetail}\n\n⚠️ Disclaimer: This is general health information only. Please consult a qualified doctor for medical diagnosis and treatment.`;
    }
    return data.content?.[0]?.text || '⚠️ Unable to fetch AI suggestions right now. General advice: maintain a healthy diet, take medicines on time, and consult a doctor if needed.';
  } catch (err) {
    console.error('AI Suggestion Error:', err);
    return '⚠️ Unable to fetch AI suggestions right now. Please check your internet connection.\n\n• 💧 **Hydration**: Drink 8-10 glasses of water daily\n• ⏰ **Consistency**: Take medicines at the same time every day\n• 🥗 **Diet**: Eat balanced meals with fruits and vegetables\n• 🚶 **Exercise**: 30 minutes of light walking daily\n• 😴 **Sleep**: Aim for 7-8 hours of quality sleep\n\n⚠️ Disclaimer: This is general health information only. Please consult a qualified doctor for medical diagnosis and treatment.';
  }
}


function formatAISuggestionText(text){
  if(!text)return null;
  const lines=text.split('\n').filter(l=>l.trim());
  return lines.map((line,i)=>{
    const trimmed=line.trim();
    // Disclaimer line
    if(trimmed.startsWith('⚠️')){
      return(
        <div key={i} style={{marginTop:14,padding:'10px 14px',background:'#fefce8',borderRadius:8,fontSize:12,color:'#854d0e',lineHeight:1.5}}>
          {trimmed}
        </div>
      );
    }
    // Bullet lines: • or - or *
    if(trimmed.startsWith('•')||trimmed.startsWith('-')||trimmed.startsWith('*')){
      const content=trimmed.replace(/^[•\-\*]\s*/,'');
      const parts=content.split('**');
      return(
        <div key={i} className="ai-tip">
          {parts.map((part,j)=>j%2===1?<strong key={j}>{part}</strong>:<span key={j}>{part}</span>)}
        </div>
      );
    }
    // Numbered lines: 1. 2. etc
    if(/^\d+[\.\)]\s/.test(trimmed)){
      const content=trimmed.replace(/^\d+[\.\)]\s*/,'');
      const parts=content.split('**');
      return(
        <div key={i} className="ai-tip">
          {parts.map((part,j)=>j%2===1?<strong key={j}>{part}</strong>:<span key={j}>{part}</span>)}
        </div>
      );
    }
    // Plain text lines
    if(trimmed){
      const parts=trimmed.split('**');
      return(
        <div key={i} style={{fontSize:14,color:'#0d3326',lineHeight:1.65,marginBottom:6}}>
          {parts.map((part,j)=>j%2===1?<strong key={j}>{part}</strong>:<span key={j}>{part}</span>)}
        </div>
      );
    }
    return null;
  });
}

function LocationPage({showToast}){
  const[loc,setLoc]=useState(null);
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState('');
 
  const detect=async()=>{
    setBusy(true);setErr('');setLoc(null);
    if(!navigator.geolocation){setErr('Geolocation is not supported in your browser.');setBusy(false);return;}
    navigator.geolocation.getCurrentPosition(
      async pos=>{
        try{
          const{latitude:lat,longitude:lon}=pos.coords;
          const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=en`);
          const d=await r.json();const a=d.address||{};
          const info={
            city:a.city||a.town||a.village||a.county||'Your city',
            state:a.state||'N/A',country:a.country||'India',
            postcode:a.postcode||'N/A',
            lat:lat.toFixed(5),lon:lon.toFixed(5),full:d.display_name,
            temp:Math.round(24+Math.random()*10),
            humidity:Math.round(55+Math.random()*30),
            aqi:Math.round(70+Math.random()*60)
          };
          setLoc(info);showToast('Location detected! 📍');
        }catch{setErr('Could not fetch location details. Check your internet connection.');}
        setBusy(false);
      },
      e=>{setErr(`Could not get location: ${e.message}. Please enable location permissions in your browser settings.`);setBusy(false);}
    );
  };
 
  return(
    <div>
      <div style={{marginBottom:24}}>
        <h1 className="serif" style={{fontSize:26,color:'#0d3326'}}>Location &amp; Health Advisory</h1>

function HealthInsurance({showToast}){
  const CACHE_KEY='insurance_cache';
  const[schemes,setSchemes]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  const[filterState,setFilterState]=useState('All');
  const[filterCat,setFilterCat]=useState('All');
  const[expanded,setExpanded]=useState(null);

  useEffect(()=>{
    const cached=DB.get(CACHE_KEY);
    if(cached&&cached.ts&&(Date.now()-cached.ts)<3600000*6){
      setSchemes(cached.data);setLoading(false);return;
    }
    // Simulate API fetch with mock data
    setTimeout(()=>{
      DB.set(CACHE_KEY,{data:INSURANCE_SCHEMES,ts:Date.now()});
      setSchemes(INSURANCE_SCHEMES);setLoading(false);
    },1200);
  },[]);

  const states=['All',...[...new Set(INSURANCE_SCHEMES.map(s=>s.state))].sort()];
  const categories=['All',...[...new Set(INSURANCE_SCHEMES.map(s=>s.category))].sort()];

  const filtered=schemes.filter(s=>{
    const q=search.toLowerCase();
    const matchQ=!q||s.name.toLowerCase().includes(q)||s.eligibility.toLowerCase().includes(q)||s.benefits.toLowerCase().includes(q);
    const matchState=filterState==='All'||s.state===filterState;
    const matchCat=filterCat==='All'||s.category===filterCat;
    return matchQ&&matchState&&matchCat;
  });

  const SkeletonCard=()=>(
    <div className="card" style={{padding:20}}>
      <div className="skeleton" style={{height:18,width:'60%',marginBottom:12}}></div>
      <div className="skeleton" style={{height:12,marginBottom:8}}></div>
      <div className="skeleton" style={{height:12,width:'80%',marginBottom:8}}></div>
      <div className="skeleton" style={{height:12,width:'40%'}}></div>
    </div>
  );

  return(
    <div>
      <div style={{marginBottom:24}}>
        <h1 className="serif" style={{fontSize:26,color:'#0d3326'}}>Government Health Insurance 🏥</h1>
        <p style={{color:'#6b8f7e',fontSize:14,marginTop:2}}>India's government health schemes — eligibility, benefits, and how to apply</p>
      </div>

      {/* Search & Filters */}
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <input className="input" style={{flex:'1 1 220px'}} placeholder="🔍 Search schemes…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="input" style={{flex:'0 1 180px'}} value={filterState} onChange={e=>setFilterState(e.target.value)}>
          {states.map(s=><option key={s} value={s}>{s==='All'?'All States':s}</option>)}
        </select>
        <select className="input" style={{flex:'0 1 190px'}} value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
          {categories.map(c=><option key={c} value={c}>{c==='All'?'All Categories':c}</option>)}
        </select>
        {(search||filterState!=='All'||filterCat!=='All')&&(
          <button className="btn-outline" style={{fontSize:13,padding:'8px 14px'}} onClick={()=>{setSearch('');setFilterState('All');setFilterCat('All');}}>Clear</button>
        )}
      </div>

      {!loading&&(
        <div style={{marginBottom:14,fontSize:13,color:'#6b8f7e'}}>
          Showing <strong style={{color:'#0d3326'}}>{filtered.length}</strong> of {schemes.length} schemes
          {(filterState!=='All'||filterCat!=='All')&&` · Filtered by: ${filterState!=='All'?filterState:''}${filterState!=='All'&&filterCat!=='All'?' + ':''}${filterCat!=='All'?filterCat:''}`}
        </div>
      )}

      {loading
        ?<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:14}}>
          {[1,2,3,4,5,6].map(i=><SkeletonCard key={i}/>)}
        </div>
        :filtered.length===0
          ?<div className="card" style={{padding:48,textAlign:'center'}}>
            <div style={{fontSize:48,marginBottom:12}}>🔍</div>
            <h3 style={{fontWeight:600,marginBottom:6}}>No schemes found</h3>
            <p style={{color:'#6b8f7e',fontSize:14}}>Try adjusting your search or filters</p>
          </div>
          :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:14}}>
            {filtered.map(s=>(
              <div key={s.id} className="ins-card" style={{background:s.color,border:`1px solid ${s.border}`}}>
                <div style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:12}}>
                  <div style={{fontSize:28,flexShrink:0}}>{s.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <h3 style={{fontWeight:700,fontSize:14,color:'#0d3326',lineHeight:1.4,marginBottom:4}}>{s.name}</h3>
                    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                      <span style={{background:'#fff',border:'1px solid '+s.border,borderRadius:100,padding:'2px 8px',fontSize:11,fontWeight:600,color:'#0d6e4a'}}>{s.state}</span>
                      <span style={{background:'#fff',border:'1px solid '+s.border,borderRadius:100,padding:'2px 8px',fontSize:11,fontWeight:600,color:'#0369a1'}}>{s.category}</span>
                    </div>
                  </div>
                </div>

                <div style={{fontSize:13,marginBottom:8}}>
                  <span style={{fontWeight:600,color:'#6b8f7e'}}>Eligibility: </span>
                  <span style={{color:'#0d3326'}}>{s.eligibility}</span>
                </div>

                {(expanded===s.id)&&(
                  <div style={{fontSize:13,marginBottom:10}}>
                    <span style={{fontWeight:600,color:'#6b8f7e'}}>Benefits: </span>
                    <span style={{color:'#0d3326'}}>{s.benefits}</span>

                )}

                <div style={{display:'flex',gap:8,marginTop:10}}>
                  <button onClick={()=>setExpanded(expanded===s.id?null:s.id)}

                    {expanded===s.id?'▲ Less':'▼ View Benefits'}
                  </button>
                  <a href={s.applyLink} target="_blank" rel="noopener noreferrer"
                    style={{flex:1,background:'linear-gradient(135deg,#22a06b,#0e7490)',color:'#fff',borderRadius:8,padding:'7px',fontSize:12,fontWeight:600,textDecoration:'none',textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    Apply Now →
                  </a>
                </div>
              </div>
            ))}
          </div>
      }

      <div style={{marginTop:18,padding:'14px 18px',background:'#fefce8',borderRadius:12,border:'1px solid #fef08a',fontSize:13,color:'#854d0e'}}>
        ℹ️ <strong>Note:</strong> Information is for reference only. Scheme details may change. Always verify eligibility and current benefits on the official government portals before applying.
      </div>
    </div>
  );
}

function AlarmSettings({user,meds,showToast,alarmEnabled,setAlarmEnabled}){
  const[notifPerm,setNotifPerm]=useState(Notification.permission);
  const today=todayStr();

  const requestPermission=async()=>{
    const p=await Notification.requestPermission();
    setNotifPerm(p);
    if(p==='granted')showToast('Notifications enabled! 🔔');
    else showToast('Notification permission denied','error');
  };

  const testAlarm=()=>{
    playAlarmSound();
    if(Notification.permission==='granted'){
      new Notification('SevaCare Test Alarm',{body:'This is a test alarm from SevaCare! Your alarms are working correctly. 💊',icon:'🏥'});
    }
    showToast('Test alarm triggered! 🔔');
  };

  const nextAlarmTime=(med)=>{
    const now=new Date();
    const[h,m]=med.time.split(':').map(Number);
    const alarmH=h,alarmM=Math.max(0,m-10);
    const alarmTime=new Date();
    alarmTime.setHours(alarmH,alarmM,0,0);
    if(alarmTime<=now)alarmTime.setDate(alarmTime.getDate()+1);
    const diff=alarmTime-now;
    const hrs=Math.floor(diff/3600000);
    const mins=Math.floor((diff%3600000)/60000);
    return hrs>0?`in ${hrs}h ${mins}m`:`in ${mins}m`;
  };

  return(
    <div>
      <div style={{marginBottom:24}}>
        <h1 className="serif" style={{fontSize:26,color:'#0d3326'}}>Alarm & Reminder System ⏰</h1>
        <p style={{color:'#6b8f7e',fontSize:14,marginTop:2}}>Get notified 10 minutes before each medicine time</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,alignItems:'start'}}>
        <div>
          {/* Master toggle */}
          <div className="card" style={{padding:22,marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div>
                <h3 style={{fontWeight:600,fontSize:15,marginBottom:3}}>Medicine Reminders</h3>
                <p style={{fontSize:13,color:'#6b8f7e'}}>10-minute advance alarm for all medicines</p>
              </div>
              <div onClick={()=>{
                const newVal=!alarmEnabled;
                setAlarmEnabled(newVal);
                AlarmSvc.saveSettings({enabled:newVal});
                showToast(newVal?'Reminders enabled 🔔':'Reminders disabled','info');
              }} style={{width:52,height:28,borderRadius:100,background:alarmEnabled?'#22a06b':'#d1d5db',padding:'4px',cursor:'pointer',transition:'background .2s',display:'flex',alignItems:'center',justifyContent:alarmEnabled?'flex-end':'flex-start'}}>
                <div style={{width:20,height:20,borderRadius:50,background:'#fff',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}></div>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn-primary" style={{flex:1,padding:'9px',fontSize:13}} onClick={testAlarm}>
                🔔 Test Alarm
              </button>
              {notifPerm!=='granted'&&(
                <button className="btn-outline" style={{flex:1,padding:'9px',fontSize:13}} onClick={requestPermission}>
                  📲 Enable Notifications
                </button>
              )}
            </div>
          </div>

          {/* Notification permission status */}
          <div className="card" style={{padding:18,marginBottom:14,background:notifPerm==='granted'?'#f0fdf4':'#fefce8',border:`1px solid ${notifPerm==='granted'?'#bbf7d0':'#fef08a'}`}}>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <span style={{fontSize:24}}>{notifPerm==='granted'?'✅':'⚠️'}</span>
              <div>
                <div style={{fontWeight:600,fontSize:14,color:'#0d3326'}}>Browser Notifications: {notifPerm==='granted'?'Allowed':'Not Allowed'}</div>
                <div style={{fontSize:12,color:'#6b8f7e',marginTop:2}}>
                  {notifPerm==='granted'?'You will receive popup notifications even in background.':'Click "Enable Notifications" above to allow browser alerts.'}
                </div>
              </div>
            </div>
          </div>

          {/* How it works */}
          <div className="card" style={{padding:18}}>
            <h4 style={{fontWeight:600,fontSize:14,marginBottom:12}}>⚙️ How Alarms Work</h4>
            {[
              ['⏰','10 min before','Alarm triggers 10 minutes before each medicine time'],
              ['🔊','Sound alert','Plays a notification sound in your browser'],
              ['🔔','Browser popup','Shows a notification even if tab is in background'],
              ['🔄','Daily repeat','Alarms automatically repeat every day'],
              ['💾','Survives reload','Schedules are recalculated on every page load'],
            ].map(([i,t,d])=>(
              <div key={t} style={{display:'flex',gap:12,padding:'9px 0',borderBottom:'1px solid #f5f5f5'}}>
                <span style={{fontSize:18,flexShrink:0}}>{i}</span>
                <div>
                  <div style={{fontWeight:600,fontSize:13,color:'#0d3326'}}>{t}</div>
                  <div style={{fontSize:12,color:'#6b8f7e',marginTop:1}}>{d}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Medicine alarm schedule */}
        <div>
          <div className="card" style={{padding:22}}>
            <h3 style={{fontWeight:600,fontSize:15,marginBottom:14}}>📋 Your Medicine Alarm Schedule</h3>
            {meds.length===0
              ?<div style={{textAlign:'center',padding:'24px 0',color:'#6b8f7e'}}>
                <div style={{fontSize:36,marginBottom:8}}>💊</div>
                <div style={{fontWeight:600,fontSize:14,color:'#0d3326'}}>No medicines added</div>
                <div style={{fontSize:13,marginTop:4}}>Add medicines to set up alarms</div>
              </div>
              :[...meds].sort((a,b)=>a.time.localeCompare(b.time)).map(m=>{
                const alarmTime=`${String(Math.max(0,parseInt(m.time.split(':')[0]))).padStart(2,'0')}:${String(Math.max(0,parseInt(m.time.split(':')[1])-10)).padStart(2,'0')}`;
                const tk=m.takenDates?.includes(today);
                return(
                  <div key={m.id} style={{display:'flex',gap:12,alignItems:'center',padding:'11px 0',borderBottom:'1px solid #f5f5f5'}}>
                    <div style={{fontSize:22}}>{alarmEnabled?'🔔':'🔕'}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13,color:'#0d3326'}}>{m.name}</div>
                      <div style={{fontSize:12,color:'#6b8f7e',marginTop:2}}>
                        <span>💊 Due: {fmtTime(m.time)}</span>
                        <span style={{marginLeft:10}}>⏰ Alarm: {fmtTime(alarmTime)}</span>
                      </div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                      <span className={alarmEnabled?'alarm-on':'alarm-off'}>{alarmEnabled?'Active':'Off'}</span>
                      {alarmEnabled&&!tk&&<span style={{fontSize:10,color:'#6b8f7e'}}>{nextAlarmTime(m)}</span>}
                      {tk&&<span style={{fontSize:10,color:'#15803d'}}>✓ Taken today</span>}
                    </div>
                  </div>
                );
              })
            }
          </div>
        </div>
      </div>
    </div>
  );
}

function Profile({user,meds,onLogout,showToast}){
  const[editing,setEditing]=useState(false);
  const[name,setName]=useState(user.name);
  const today=todayStr();
  const taken=meds.filter(m=>m.takenDates?.includes(today)).length;
  const totalDoses=meds.reduce((a,m)=>a+(m.takenDates?.length||0),0);
 
  const save=()=>{
    if(name.trim().length<2){showToast('Name needs at least 2 characters','error');return;}
    const users=DB.get('users')||[];
    const i=users.findIndex(u=>u.id===user.id);
    if(i>=0){users[i].name=name.trim();DB.set('users',users);}
    DB.set('me',{...DB.get('me'),name:name.trim()});
    setEditing(false);showToast('Profile updated! ✏️');
    setTimeout(()=>window.location.reload(),400);

  const[notifOn,setNotifOn]=useState({reminders:true,tips:true,missed:true});
 
  return(
    <div>
      <div style={{marginBottom:24}}>

        <p style={{color:'#6b8f7e',fontSize:14,marginTop:2}}>Manage your account and preferences</p>

              ?<div>
                <input className="input" value={name} onChange={e=>setName(e.target.value)} style={{textAlign:'center',marginBottom:12}}/>

                  <button className="btn-outline" style={{flex:1}} onClick={()=>{setEditing(false);setName(user.name);}}>Cancel</button>

            <h3 style={{fontWeight:600,fontSize:15,marginBottom:14}}>Account Details</h3>

            <h3 style={{fontWeight:600,fontSize:15,marginBottom:14}}>Health Statistics</h3>
