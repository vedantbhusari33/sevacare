              <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #f5f5f5'}}>
                <span style={{fontSize:14}}>{l}</span>
                <div onClick={()=>setNotifOn(p=>({...p,[k]:!p[k]}))} style={{width:46,height:26,borderRadius:100,background:notifOn[k]?'#22a06b':'#d1d5db',padding:'3px',cursor:'pointer',transition:'background .2s',display:'flex',alignItems:'center',justifyContent:notifOn[k]?'flex-end':'flex-start'}}>
                  <div style={{width:20,height:20,borderRadius:50,background:'#fff',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}></div>
                </div>
              </div>
            ))}
          </div>
 
          <button className="btn-danger" style={{width:'100%',padding:13,fontSize:15,borderRadius:12}} onClick={()=>{onLogout();showToast('Signed out. See you soon! 👋','info');}}>
            Sign Out
          </button>
        </div>
      </div>
    </div>
  );
}
 
/* ═══════════════════════════════════════════════════════
   ALARM SOUND UTILITY
═══════════════════════════════════════════════════════ */
function playAlarmSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const play=(freq,start,dur)=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type='sine';
      g.gain.setValueAtTime(0.3,ctx.currentTime+start);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
      o.start(ctx.currentTime+start);
      o.stop(ctx.currentTime+start+dur);
    };
    [880,1100,880,1100].forEach((f,i)=>play(f,i*0.25,0.22));
    setTimeout(()=>ctx.close(),2000);
  }catch(e){console.log('Audio not available');}
}

/* ─── Alarm popup component ─── */
function AlarmPopup({alarm,onDismiss}){
  useEffect(()=>{
    const t=setTimeout(onDismiss,15000);
    return()=>clearTimeout(t);
  },[]);
  return(
    <div className="alarm-popup">
      <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
        <div style={{fontSize:30,flexShrink:0}}>⏰</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15,color:'#0d3326',marginBottom:4}}>Medicine Reminder</div>
          <div style={{fontSize:14,color:'#0d6e4a',marginBottom:2}}>
            <strong>{alarm.name}</strong> ({alarm.dosage})
          </div>
          <div style={{fontSize:13,color:'#6b8f7e'}}>Due in 10 minutes at {fmtTime(alarm.time)}</div>
        </div>
        <button onClick={onDismiss} style={{background:'#f5f5f5',border:'none',width:28,height:28,borderRadius:8,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>×</button>
      </div>
      <button className="btn-primary" style={{width:'100%',marginTop:12,padding:'9px',fontSize:13}} onClick={onDismiss}>Got it, thanks!</button>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(()=>AuthSvc.current());
  const[page,setPage]=useState('dashboard');
  const[meds,setMeds]=useState([]);
  const[notifs,setNotifs]=useState([]);
  const[sidebar,setSidebar]=useState(true);
  const[alarmEnabled,setAlarmEnabled]=useState(()=>AlarmSvc.getSettings().enabled);
  const[activeAlarm,setActiveAlarm]=useState(null);
  const{toasts,show}=useToast();
  const timerRef=useRef(null);
  const alarmTimersRef=useRef([]);
  const firedAlarmsRef=useRef(new Set());

  /* ─── Schedule alarm timers ─── */
  const scheduleAlarms=useCallback((medList,enabled)=>{
    // Clear existing timers
    alarmTimersRef.current.forEach(t=>clearTimeout(t));
    alarmTimersRef.current=[];
    if(!enabled)return;

    const now=new Date();
    medList.forEach(med=>{
      if(!med.time)return;
      const[h,m]=med.time.split(':').map(Number);
      // Alarm fires 10 minutes before medicine time
      const alarmH=h;
      const alarmM=m-10;
      const normalizedAlarmM=alarmM<0?50+(alarmM+10):alarmM; // handle <0 minutes
      const normalizedAlarmH=alarmM<0?h-1:h;

      const target=new Date();
      target.setHours(normalizedAlarmH,normalizedAlarmM,0,0);

      // If already passed today, schedule for tomorrow
      if(target<=now)target.setDate(target.getDate()+1);

      const delay=target-now;
      const alarmKey=`${med.id}-${target.toDateString()}`;

      if(firedAlarmsRef.current.has(alarmKey))return;

      const t=setTimeout(()=>{
        firedAlarmsRef.current.add(alarmKey);
        // Check if medicine already taken
        const currentMeds=MedSvc.all(med.userId||'');
        const latestMed=currentMeds.find(x=>x.id===med.id)||med;
        if(latestMed.takenDates?.includes(todayStr()))return;

        playAlarmSound();
        setActiveAlarm(med);

        if(Notification.permission==='granted'){
          new Notification('SevaCare – Medicine Reminder',{
            body:`⏰ Take ${med.name} (${med.dosage}) in 10 minutes!`,
            icon:'🏥',
            requireInteraction:true
          });
        }
        // Re-schedule for next day
        setTimeout(()=>scheduleAlarms(medList,enabled),1000);
      },delay);

      alarmTimersRef.current.push(t);
    });
  },[]);

  useEffect(()=>{
    if(user){
      setMeds(MedSvc.all(user.id));
      setNotifs(NotifSvc.all(user.id));
    }
  },[user]);

  // Re-schedule alarms whenever meds or enabled state changes
  useEffect(()=>{
    if(user&&meds.length>0){
      const medsWithUser=meds.map(m=>({...m,userId:user.id}));
      scheduleAlarms(medsWithUser,alarmEnabled);
    }
    return()=>{alarmTimersRef.current.forEach(t=>clearTimeout(t));};
  },[user,meds,alarmEnabled,scheduleAlarms]);

  // Reminder ticker every 30s (existing logic kept)
  useEffect(()=>{
    if(!user)return;
    const tick=()=>{
      const cur=now24(),today=todayStr();
      const list=MedSvc.all(user.id);
      list.forEach(m=>{
        const[mh,mm]=m.time.split(':').map(Number);
        const[ch,cm]=cur.split(':').map(Number);
        const diff=Math.abs(mh*60+mm-(ch*60+cm));
        if(diff<=1&&!m.takenDates?.includes(today)){
          const ns=NotifSvc.add(user.id,`⏰ Time to take ${m.name} (${m.dosage})!`,'reminder');
          setNotifs(ns);
          show(`⏰ Reminder: Take ${m.name} now!`,'info');
          if(Notification.permission==='granted')new Notification('SevaCare',{body:`Take ${m.name} (${m.dosage})`,icon:'🏥'});
        }
      });
    };
    timerRef.current=setInterval(tick,30000);
    return()=>clearInterval(timerRef.current);
  },[user]);

  useEffect(()=>{if(user&&Notification.permission==='default')Notification.requestPermission();},[user]);

  const onAuth=u=>{
    setUser(u);
    setMeds(MedSvc.all(u.id));
    const ns=NotifSvc.add(u.id,'Welcome to SevaCare! Add your medicines to get started. 💊','info');
    setNotifs(ns);
  };
  const onLogout=()=>{AuthSvc.logout();setUser(null);setMeds([]);setNotifs([]);setPage('dashboard');alarmTimersRef.current.forEach(t=>clearTimeout(t));};
  const onSave=form=>{const l=MedSvc.save(user.id,form);setMeds(l);const ns=NotifSvc.add(user.id,`Medicine "${form.name}" ${form.id?'updated':'added'}.`,'success');setNotifs(ns);};
  const onDel=id=>{const m=meds.find(x=>x.id===id);const l=MedSvc.del(user.id,id);setMeds(l);const ns=NotifSvc.add(user.id,`"${m?.name||'Medicine'}" removed from schedule.`,'info');setNotifs(ns);};
  const onTaken=id=>{const l=MedSvc.markTaken(user.id,id);setMeds(l);const m=l.find(x=>x.id===id);const ns=NotifSvc.add(user.id,`✅ ${m?.name} marked as taken for today.`,'success');setNotifs(ns);};
  const onRead=id=>setNotifs(NotifSvc.markRead(user.id,id));
  const onReadAll=()=>setNotifs(NotifSvc.markAllRead(user.id));

  if(!user)return<><AuthScreen onAuth={onAuth} showToast={show}/><Toast toasts={toasts}/></>;

  const unread=notifs.filter(n=>!n.read).length;

  const nav=[
    {id:'dashboard',label:'Dashboard',icon:'🏠'},
    {id:'medicines',label:'Medicines',icon:'💊'},
    {id:'schedule',label:'Schedule',icon:'📅'},
    {id:'notifications',label:'Notifications',icon:'🔔',badge:unread},
    {id:'chatbot',label:'AI Chatbot',icon:'🤖'},
    {id:'ai',label:'AI Suggestions',icon:'✨'},
    {id:'insurance',label:'Health Insurance',icon:'🏥'},
    {id:'alarms',label:'Alarm Settings',icon:'⏰'},
    {id:'location',label:'Location',icon:'📍'},
    {id:'profile',label:'Profile',icon:'👤'},
  ];

  const pages={
    dashboard:<Dashboard user={user} meds={meds} onMarkTaken={onTaken} showToast={show}/>,
    medicines:<Medicines user={user} meds={meds} onSave={onSave} onDelete={onDel} onMarkTaken={onTaken} showToast={show}/>,
    schedule:<Schedule meds={meds} onMarkTaken={onTaken} showToast={show}/>,
    notifications:<Notifications user={user} notifs={notifs} onMarkRead={onRead} onMarkAllRead={onReadAll}/>,
    chatbot:<AIChatbot user={user} meds={meds} showToast={show}/>,
    ai:<AISuggestions user={user} meds={meds} showToast={show}/>,
    insurance:<HealthInsurance showToast={show}/>,
    alarms:<AlarmSettings user={user} meds={meds} showToast={show} alarmEnabled={alarmEnabled} setAlarmEnabled={setAlarmEnabled}/>,
    location:<LocationPage showToast={show}/>,
    profile:<Profile user={user} meds={meds} onLogout={onLogout} showToast={show}/>,
  };

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      {/* Sidebar */}
      <aside style={{width:sidebar?244:72,background:'#fff',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',transition:'width .25s',flexShrink:0,position:'sticky',top:0,height:'100vh',overflowY:'auto',overflowX:'hidden'}}>
        <div style={{padding:'18px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:38,height:38,borderRadius:10,background:'linear-gradient(135deg,#22a06b,#0e7490)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🏥</div>
          {sidebar&&<span className="serif" style={{fontSize:20,color:'#0d3326',whiteSpace:'nowrap'}}>SevaCare</span>}
        </div>

        <nav style={{padding:'12px 10px',flex:1}}>
          {nav.map(n=>(
            <div key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)} title={n.label}>
              <span style={{fontSize:18,flexShrink:0}}>{n.icon}</span>
              {sidebar&&<>
                <span style={{flex:1,whiteSpace:'nowrap'}}>{n.label}</span>
                {n.badge>0&&<span className="badge">{n.badge}</span>}
              </>}
            </div>
          ))}
        </nav>

        <div style={{padding:'10px',borderTop:'1px solid var(--border)'}}>
          <button onClick={()=>setSidebar(p=>!p)} style={{background:'#f5f5f5',border:'none',cursor:'pointer',color:'#6b8f7e',padding:'8px',borderRadius:8,width:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontFamily:'DM Sans,sans-serif'}}>
            {sidebar?'◀ Collapse':'▶'}
          </button>
        </div>
      </aside>

      {/* Main */}
      <main style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        {/* Topbar */}
        <header style={{background:'#fff',borderBottom:'1px solid var(--border)',padding:'13px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:100}}>
          <div>
            <div style={{fontWeight:600,fontSize:15,color:'#0d3326'}}>
              {nav.find(n=>n.id===page)?.icon} {nav.find(n=>n.id===page)?.label}
            </div>
            <div style={{fontSize:12,color:'#6b8f7e',marginTop:1}}>{new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button style={{background:'none',border:'none',cursor:'pointer',fontSize:22,position:'relative',lineHeight:1}} onClick={()=>setPage('notifications')}>
              🔔{unread>0&&<span className="badge" style={{position:'absolute',top:-6,right:-6,fontSize:10,padding:'0 4px',lineHeight:'16px'}}>{unread}</span>}
            </button>
            <div className="avatar" style={{width:36,height:36,fontSize:14,cursor:'pointer'}} onClick={()=>setPage('profile')}>
              {user.name[0].toUpperCase()}
            </div>
          </div>
        </header>

        <div style={{padding:'26px 28px',flex:1}}>
          {pages[page]}
        </div>
      </main>

      {activeAlarm&&<AlarmPopup alarm={activeAlarm} onDismiss={()=>setActiveAlarm(null)}/>}
      <Toast toasts={toasts}/>
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
